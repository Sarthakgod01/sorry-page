<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>I'm Really Sorry 🥺</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;
background:linear-gradient(-45deg,#7dd3fc,#c4b5fd,#bfdbfe,#a7f3d0);background-size:400% 400%;animation:bg 14s ease infinite}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card{width:min(92%,760px);background:rgba(255,255,255,.2);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.35);
border-radius:28px;padding:30px;color:#1f2937;box-shadow:0 20px 40px rgba(0,0,0,.2);animation:floatcard 4s ease-in-out infinite;position:relative;z-index:2}
@keyframes floatcard{50%{transform:translateY(-8px)}}
h1{text-align:center;font-size:3rem}#type{margin-top:20px;font-size:1.2rem;line-height:1.8;min-height:320px;white-space:pre-wrap}
button{display:block;margin:20px auto 0;padding:12px 24px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:18px}
.e{position:absolute;font-size:28px;opacity:.55;animation:rise linear infinite}
@keyframes rise{from{transform:translateY(110vh) rotate(0)}to{transform:translateY(-15vh) rotate(360deg)}}
.spark{position:absolute;width:4px;height:4px;background:white;border-radius:50%;opacity:.8;animation:tw 2s infinite}
@keyframes tw{50%{transform:scale(2);opacity:.2}}
</style></head><body>
<div class="card">
<h1>I'm Really Sorry 🥺</h1>
<div id="type"></div>
<button onclick="restart()">Replay</button>
</div>
<script>
const msg=`Hi Ruhii,

I know you're upset with me, and I completely understand.

I'm truly sorry for what happened.

Hurting you was never my intention.
If I could take back my mistake, I would.

Our friendship means a lot to me.
I'm not asking you to forgive me immediately.
Take all the time you need.

I only wanted you to know how genuinely sorry I am.

Thank you for reading this. 🥺`;
let i=0,t=document.getElementById("type");
function type(){if(i<msg.length){t.textContent+=msg[i++];setTimeout(type,30);}}
function restart(){i=0;t.textContent="";type();}
type();
for(let i=0;i<35;i++){let d=document.createElement("div");d.className="e";d.textContent="🥺";d.style.left=Math.random()*100+"vw";d.style.animationDuration=(8+Math.random()*8)+"s";d.style.animationDelay=(-Math.random()*10)+"s";document.body.appendChild(d);}
for(let i=0;i<50;i++){let s=document.createElement("div");s.className="spark";s.style.left=Math.random()*100+"vw";s.style.top=Math.random()*100+"vh";s.style.animationDelay=(Math.random()*2)+"s";document.body.appendChild(s);}
</script></body></html>
