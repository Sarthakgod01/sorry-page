<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>I'm Sorry</title>
<style>
*{box-sizing:border-box}body{margin:0;overflow:hidden;font-family:system-ui;background:linear-gradient(-45deg,#89cff0,#cdb4ff,#bde0fe,#d8f3dc);background-size:400% 400%;animation:bg 15s ease infinite;display:flex;justify-content:center;align-items:center;min-height:100vh}
@keyframes bg{50%{background-position:100% 50%}}
#env{width:320px;height:210px;background:#fff3;border:1px solid #fff7;backdrop-filter:blur(12px);border-radius:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:28px;box-shadow:0 20px 40px #0003}
.card{display:none;width:min(92%,760px);background:#ffffffd9;backdrop-filter:blur(16px);border-radius:24px;padding:28px;box-shadow:0 20px 50px #0003;animation:up .8s}
@keyframes up{from{transform:translateY(40px);opacity:0}to{opacity:1}}
h1{text-align:center}#msg{white-space:pre-wrap;line-height:1.8;min-height:330px;font-size:1.1rem}
.btns{text-align:center;margin-top:20px}button{padding:12px 22px;margin:8px;border:0;border-radius:10px;background:#2563eb;color:#fff}
.e{position:absolute;animation:rise linear infinite;font-size:30px;opacity:.5}@keyframes rise{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}
.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:tw 2s infinite}@keyframes tw{50%{transform:scale(2);opacity:.2}}
</style></head><body>
<div id='env'>📩 Click to Open</div>
<div class='card' id='card'><h1>I'm Really Sorry 🥺</h1><div id='msg'></div><div class='btns'><button onclick='restart()'>Click Here</button><button onclick='alert("Thank you for reading. 🥺")'>Thanks for Reading</button></div></div>
<script>
const text=`Hi Ruhii,

I know you're upset with me, and I understand why.

I'm truly sorry.

Hurting you was never my intention, and if I could go back and change what happened, I would.

I'm not expecting you to forgive me immediately.
Take all the time you need.

I just wanted you to know that this apology comes from my heart, with honesty and respect.

No matter what happens, thank you for the memories, the laughter, and for being an important part of my life.

I sincerely hope that one day you'll smile again when you think of me.

Thank you for reading this. 🥺`;
let i=0;
function type(){if(i<text.length){msg.textContent+=text[i++];setTimeout(type,28);}}
function restart(){i=0;msg.textContent='';type();}
env.onclick=()=>{env.style.display='none';card.style.display='block';restart();}
for(let i=0;i<40;i++){let d=document.createElement('div');d.className='e';d.textContent='🥺';d.style.left=Math.random()*100+'vw';d.style.animationDuration=(8+Math.random()*8)+'s';d.style.animationDelay=(-Math.random()*8)+'s';document.body.appendChild(d);}
for(let i=0;i<80;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';s.style.animationDelay=Math.random()*2+'s';document.body.appendChild(s);}
</script></body></html>
