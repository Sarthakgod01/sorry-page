<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>I'm Sorry</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;font-family:Arial,sans-serif;background:linear-gradient(-45deg,#89cff0,#cdb4ff,#bde0fe,#d8f3dc);background-size:400% 400%;animation:bg 15s ease infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
#env{padding:30px 40px;border-radius:20px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);color:#fff;font-size:28px;cursor:pointer}
.card{display:none;width:min(92%,720px);background:rgba(255,255,255,.88);padding:28px;border-radius:24px}
#msg{white-space:pre-wrap;line-height:1.8;min-height:280px}
button{display:none;margin:20px auto 0;padding:12px 24px;background:#2563eb;color:#fff;border:0;border-radius:10px}
.e{position:absolute;opacity:.45;font-size:28px;animation:rise linear infinite}@keyframes rise{from{transform:translateY(110vh)}to{transform:translateY(-15vh)}}
</style></head><body>
<div id='env'>📩 Click to Open</div>
<div class='card' id='card'><h1>I'm Really Sorry 🥺</h1><div id='msg'></div><button id='next'>Click Here</button><p id='end' style='display:none;text-align:center;font-weight:bold'>Thank you for reading. 🥺</p></div>
<script>
const txt=`I'm really sorry Ruhi. 🥺

First of all, I want to say that my intention was only to make a joke. I never wanted to hurt you or make you feel bad.

I think there has been some misunderstanding between us. If there is anything that I've said or done that was misunderstood, I hope you'll give me a chance to clear it up.

Please accept my friend request. I'm not trying to force you—I just don't want this misunderstanding to end our friendship.

Your friendship means a lot to me. I don't have any friend like you, and losing someone as important as you would really hurt me.

I'm not asking you to forgive me immediately. Take all the time you need. I just wanted you to know that this apology is genuine and comes from my heart.

No matter what you decide, thank you for taking the time to read this.

I truly hope we can play games together like before and laugh again someday. 🥺

I'm really sorry. 🥺`;`;
let i=0;
function type(){if(i<txt.length){msg.textContent+=txt[i++];setTimeout(type,30);}else next.style.display='block';}
env.onclick=()=>{env.style.display='none';card.style.display='block';type();}
next.onclick=()=>{next.style.display='none';end.style.display='block';}
for(let i=0;i<30;i++){let d=document.createElement('div');d.className='e';d.textContent='🥺';d.style.left=Math.random()*100+'vw';d.style.animationDuration=(8+Math.random()*8)+'s';d.style.animationDelay=(-Math.random()*8)+'s';document.body.appendChild(d);}
</script></body></html>
