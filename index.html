<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>I'm Sorry</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;background:linear-gradient(-45deg,#dbeafe,#e0f2fe,#f3f4f6,#d1fae5);background-size:400% 400%;animation:bg 15s ease infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{position:relative;z-index:2;width:min(92%,700px);background:rgba(255,255,255,.7);backdrop-filter:blur(14px);padding:32px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.15)}
h1{text-align:center}#type{white-space:pre-wrap;line-height:1.7;font-size:18px;color:#333;min-height:280px}button{padding:12px 22px;border:none;border-radius:10px;background:#2563eb;color:#fff}
.emoji{position:absolute;animation:float linear infinite;opacity:.35}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-20vh)}}
</style></head><body>
<div class="card">
<h1>I'm Really Sorry 🥺</h1>
<div id="type"></div>
<div style="text-align:center"><button onclick="location.reload()">Replay</button></div>
</div>
<script>
const text=`Hi Ruhii,

I know you're upset with me, and I understand why.

I'm genuinely sorry.

Hurting you was never my intention, and I truly regret it.

Our friendship means a lot to me, and I don't want one mistake to define it.

I'm not asking you to forgive me immediately.
Take all the time you need.

I simply wanted you to know how sorry I am.

Thank you for reading this. 🥺`;
let i=0,el=document.getElementById('type');
(function t(){if(i<text.length){el.textContent+=text[i++];setTimeout(t,35);}})();
for(let i=0;i<24;i++){let e=document.createElement('div');e.className='emoji';e.textContent='🥺';e.style.left=Math.random()*100+'vw';e.style.fontSize=(18+Math.random()*18)+'px';e.style.animationDuration=(8+Math.random()*8)+'s';e.style.animationDelay=(Math.random()*8)+'s';document.body.appendChild(e);}
</script></body></html>
